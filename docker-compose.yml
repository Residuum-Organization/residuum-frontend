version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: residuum-frontend
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      # Adicione aqui outras variáveis de ambiente se precisar, ex:
      # - VITE_API_URL=http://localhost:8000
    restart: unless-stopped
    command: npm run dev -- --host
