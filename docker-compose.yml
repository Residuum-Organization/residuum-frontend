services:
  web:
    build: .
    image: residuum-frontend
    container_name: residuum-web
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
      PORT: ${FRONTEND_PORT:-5173}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - .:/app
      - /app/node_modules
    command: >
      sh -c "pnpm run dev -- --host 0.0.0.0"
